<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotnik — SonicSaver DeFi Savings</title>

    :root {
      --bg-dark: #0c0f14;
      --bg-panel: #141922;

      --border: #2a3142;
      --text: #e8ecf4;
      --text-dim: #8b95a8;
      --accent: #f59e0b;
      --accent-soft: #d97706;
      --mint: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --font: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .app-header {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .app-header .tagline {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }
    .wallet-ui {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .wallet-ui .addr {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
    }
    .wallet-ui .addr.connected { border-color: var(--mint); color: var(--mint); }
    .wallet-ui button {
      font-family: var(--font);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .wallet-ui .btn-connect {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
    }
    .wallet-ui .btn-connect:hover { background: var(--accent-soft); filter: brightness(1.1); }
