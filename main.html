<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotnik — SonicSaver DeFi Savings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0c0f14;
      --bg-panel: #141922;
      --bg-elevated: #1a1f2e;
      --border: #2a3142;
      --text: #e8ecf4;
      --text-dim: #8b95a8;
      --accent: #f59e0b;
      --accent-soft: #d97706;
      --mint: #34d399;
      --blue: #60a5fa;
      --red: #f87171;
      --font: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .app-header {
      background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .app-header .tagline {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }
    .wallet-ui {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .wallet-ui .addr {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
    }
    .wallet-ui .addr.connected { border-color: var(--mint); color: var(--mint); }
    .wallet-ui button {
      font-family: var(--font);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .wallet-ui .btn-connect {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
    }
    .wallet-ui .btn-connect:hover { background: var(--accent-soft); filter: brightness(1.1); }
    .wallet-ui .btn-disconnect {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .wallet-ui .btn-disconnect:hover { border-color: var(--red); color: var(--red); }
    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tabs button {
      padding: 0.6rem 1.1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .tabs button:hover { color: var(--text); border-color: var(--text-dim); }
    .tabs button.active {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
    }
    .view {
      display: none;
      animation: fade 0.2s ease;
    }
    .view.visible { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .stat-box {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .stat-box .label { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 0.25rem; }
    .stat-box .value { font-family: var(--font-mono); font-size: 1.1rem; color: var(--text); }
    .stat-box .value.good { color: var(--mint); }
    .stat-box .value.warn { color: var(--accent); }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--text-dim);
      font-size: 0.875rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      max-width: 400px;
      padding: 0.65rem 0.85rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font);
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .pod-list { list-style: none; }
    .pod-list li {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .pod-list li.inactive { opacity: 0.7; }
    .pod-list .pod-meta { font-size: 0.9rem; color: var(--text-dim); }
    .pod-list .pod-meta strong { color: var(--text); }
    .pod-list .pod-cap { font-family: var(--font-mono); font-size: 0.9rem; }
    .deposit-row {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 0.6rem;
      font-size: 0.9rem;
    }
    .deposit-row .row-head { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.4rem; }
    .deposit-row .idx { color: var(--text-dim); }
    .deposit-row .unlock { font-family: var(--font-mono); color: var(--mint); }
    .deposit-row .amounts { color: var(--text-dim); }
    .deposit-row .amounts span { color: var(--text); }
    .deposit-row.locked .unlock { color: var(--accent); }
    .deposit-row .actions { margin-top: 0.5rem; }
    .deposit-row .actions button { margin-right: 0.5rem; margin-top: 0.25rem; }
    .msg {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .msg.info { background: rgba(96, 165, 250, 0.15); border: 1px solid var(--blue); color: var(--blue); }
    .msg.err { background: rgba(248, 113, 113, 0.15); border: 1px solid var(--red); color: var(--red); }
    .msg.ok { background: rgba(52, 211, 153, 0.15); border: 1px solid var(--mint); color: var(--mint); }
    .config-bar {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    .config-bar label { color: var(--text-dim); font-size: 0.85rem; margin-right: 0.25rem; }
    .config-bar input { padding: 0.4rem 0.6rem; width: 320px; max-width: 100%; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; }
    .loading { color: var(--text-dim); }
    footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.85rem; }
    .quote-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: 0.75rem; font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-dim); }
    .quote-box strong { color: var(--mint); }
    .health-ok { color: var(--mint); }
    .health-bad { color: var(--red); }
    .constants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
    .constants-grid span { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim); }
    .refresh-btn { margin-left: 0.5rem; padding: 0.35rem 0.65rem; font-size: 0.8rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; cursor: pointer; }
    .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
    .help-text { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.5rem; line-height: 1.5; }
    .panel-section { margin-bottom: 1.5rem; }
    .panel-section h3 { font-size: 1rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    table.data-table th, table.data-table td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    table.data-table th { color: var(--text-dim); font-weight: 600; }
    table.data-table td { font-family: var(--font-mono); }
    @media (max-width: 640px) {
      .app-header { padding: 1rem; }
      main { padding: 0 1rem 1rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .config-bar { flex-direction: column; align-items: stretch; }
      .config-bar input { width: 100%; }
    }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .badge.active { background: rgba(52, 211, 153, 0.2); color: var(--mint); }
    .badge.paused { background: rgba(245, 158, 11, 0.2); color: var(--accent); }
    .tile { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.75rem; }
    .tile h4 { font-size: 0.95rem; margin-bottom: 0.35rem; color: var(--text); }
    .tile p { font-size: 0.85rem; color: var(--text-dim); }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 0; }
    .btn-secondary { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; font-family: var(--font); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .muted { color: var(--text-dim); font-size: 0.85rem; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .list-plain { list-style: none; }
    .list-plain li { padding: 0.35rem 0; border-bottom: 1px solid var(--border); }
    .list-plain li:last-child { border-bottom: none; }
    .code { font-family: var(--font-mono); font-size: 0.85rem; background: var(--bg-elevated); padding: 0.2rem 0.4rem; border-radius: 4px; }
    .card-footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-dim); }
    @media print {
      .config-bar, .tabs, .wallet-ui, .btn-primary, .refresh-btn, button { display: none !important; }
      .card { break-inside: avoid; }
    }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .full-width { max-width: 100%; width: 100%; }
    .text-right { text-align: right; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-100 { width: 100%; }
    .opacity-50 { opacity: 0.5; }
    .cursor-pointer { cursor: pointer; }
    .no-select { user-select: none; }
    .border-bottom { border-bottom: 1px solid var(--border); }
    .rounded { border-radius: var(--radius); }
    .p-2 { padding: 1rem; }
    .text-center { text-align: center; }
    .font-mono { font-family: var(--font-mono); }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.8rem; }
    .font-bold { font-weight: 700; }
    .text-accent { color: var(--accent); }
    .text-mint { color: var(--mint); }
    .text-dim { color: var(--text-dim); }
    .bg-elevated { background: var(--bg-elevated); }
    .min-h-200 { min-height: 200px; }
    @media (max-width: 480px) {
      .app-header h1 { font-size: 1.35rem; }
      .tabs button { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
    }
    .hover-lift { transition: transform 0.2s; }
    .hover-lift:hover { transform: translateY(-2px); }
    .transition { transition: all 0.2s ease; }
    .overflow-auto { overflow: auto; }
    .max-h-400 { max-height: 400px; }
    .sticky-top { position: sticky; top: 0; background: var(--bg-panel); z-index: 1; padding-bottom: 0.5rem; }
    .shadow-sm { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .ring { box-shadow: 0 0 0 2px var(--accent); }
    .opacity-0 { opacity: 0; }
    .opacity-100 { opacity: 1; }
    .hidden { display: none !important; }
    .block { display: block; }
    .inline-block { display: inline-block; }
    .inline-flex { display: inline-flex; }
    .flex-1 { flex: 1; }
    .flex-col { flex-direction: column; }
    .space-y-1 > * + * { margin-top: 0.5rem; }
    .space-y-2 > * + * { margin-top: 1rem; }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Robotnik</h1>
      <p class="tagline">SonicSaver — Lock ETH, earn yield</p>
    </div>
    <div class="wallet-ui">
      <span class="addr" id="walletAddr">Not connected</span>
      <button class="btn-connect" id="btnConnect">Connect</button>
      <button class="btn-disconnect" id="btnDisconnect" style="display:none;">Disconnect</button>
    </div>
  </header>
